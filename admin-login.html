<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QASR — Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-login">
    <div class="admin-login-card">
      <div class="admin-login-logo">QASR</div>
      <h2 data-i18n="admin.login.title">Admin Login</h2>
      <p class="admin-login-sub" data-i18n="admin.login.subtitle">Sign in to manage your store</p>
      <div style="display:flex;justify-content:center;gap:6px;margin-bottom:16px">
        <div class="lang-switcher">
          <button class="lang-btn active" data-lang="en" style="font-size:0.6rem;padding:3px 7px;letter-spacing:1px;text-transform:uppercase;font-weight:600;color:var(--text-muted);background:transparent;border:1px solid transparent;cursor:pointer;transition:all 0.2s;border-radius:3px">EN</button>
          <button class="lang-btn" data-lang="ar" style="font-size:0.6rem;padding:3px 7px;letter-spacing:1px;text-transform:uppercase;font-weight:600;color:var(--text-muted);background:transparent;border:1px solid transparent;cursor:pointer;transition:all 0.2s;border-radius:3px">AR</button>
        </div>
        <button class="theme-toggle" id="loginThemeToggle" aria-label="Toggle theme" style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);background:none;border:none;cursor:pointer">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="loginThemeIcon">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
      <form id="loginForm">
        <div class="admin-field">
          <input type="email" id="loginEmail" placeholder="Email" required>
        </div>
        <div class="admin-field">
          <input type="password" id="loginPassword" placeholder="Password" required>
        </div>
        <p class="admin-login-error" id="loginError"></p>
        <button type="submit" class="admin-btn" id="loginBtn" data-i18n="admin.login.signIn">Sign In</button>
      </form>
      <p class="admin-login-footer"><span data-i18n="admin.login.returnTo">Return to</span> <a href="index.html" data-i18n="admin.login.store">store</a></p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/translations.js"></script>
  <script>
    initFirebase();

    // Restore theme + language on login page
    const savedTheme = localStorage.getItem('qasr_theme') || 'dark';
    if (savedTheme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      updateAdminThemeIcon(true, 'loginThemeIcon');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
    const savedLang = localStorage.getItem('qasr_lang') || 'en';
    currentLang = savedLang;
    document.documentElement.setAttribute('lang', savedLang);
    document.documentElement.setAttribute('dir', savedLang === 'ar' ? 'rtl' : 'ltr');
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === savedLang);
    });
    applyAdminTranslations();

    // Theme toggle on login page
    const loginThemeToggle = document.getElementById('loginThemeToggle');
    if (loginThemeToggle) {
      loginThemeToggle.addEventListener('click', function() {
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';
        if (isLight) {
          document.documentElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('qasr_theme', 'dark');
          updateAdminThemeIcon(false, 'loginThemeIcon');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
          localStorage.setItem('qasr_theme', 'light');
          updateAdminThemeIcon(true, 'loginThemeIcon');
        }
      });
    }

    // Language switching on login page
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const lang = this.dataset.lang;
        if (lang === currentLang) return;
        currentLang = lang;
        localStorage.setItem('qasr_lang', lang);
        document.documentElement.setAttribute('lang', lang);
        document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
        applyAdminTranslations();
      });
    });

    function updateAdminThemeIcon(isLight, iconId) {
      const icon = document.getElementById(iconId);
      if (!icon) return;
      if (isLight) {
        icon.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
      } else {
        icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
      }
    }

    function applyAdminTranslations() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        const text = getText(key);
        if (text && text !== key) {
          el.textContent = text;
        }
      });
    }

    firebase.auth().onAuthStateChanged(user => {
      if (user) window.location.href = 'admin.html';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');

      errorEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        await firebase.auth().signInWithEmailAndPassword(email, password);
        window.location.href = 'admin.html';
      } catch (err) {
        errorEl.textContent = err.message;
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
